<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="ryanair-mcp logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a6df4"/>
      <stop offset="1" stop-color="#0b3aa3"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#bg)"/>
  <!-- dashed flight path -->
  <path d="M34 154 Q104 40 170 72" fill="none" stroke="#ffffff" stroke-opacity="0.35"
        stroke-width="4" stroke-linecap="round" stroke-dasharray="1 13"/>
